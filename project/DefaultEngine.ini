[/Script/RemoteControl.RemoteControlSettings]
bAutoStartWebServer=True
bAutoStartWebSocketServer=True
RemoteControlHttpServerPort=30010
RemoteControlWebSocketServerPort=30020

[ConsoleVariables]
; --- Remote Control web server auto-start (HTTP 30010 / WS 30020) ---
WebControl.EnableServerOnStartup=1
RemoteControl.EnableWebServerOnStartup=1

; --- Dev-workflow shader speed on arm64 ---
; Skip the expensive DXC/SPIRV *optimization* passes (they dominate the compile time of heavy
; TSR/Lumen shaders). Big compile speedup; only SHIPPING builds need fully-optimized shaders.
r.Shaders.Optimize=0
r.Shaders.FastMath=1
r.Shaders.GenerateSymbols=0
r.Shaders.Symbols=0
